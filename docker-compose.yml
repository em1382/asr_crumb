# Dev Postgres — run: docker compose up -d
# Data directory: ./data/postgres (created on first start)
# Default URL (psycopg v3): postgresql+psycopg://crumb:crumb@localhost:5432/crumb
# Override: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, POSTGRES_PORT

services:
  postgres:
    image: postgres:16-alpine
    container_name: crumb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crumb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crumb}
      POSTGRES_DB: ${POSTGRES_DB:-crumb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
